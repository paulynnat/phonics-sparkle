<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activity I &mdash; Flashcards</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <a class="link" href="./index.html">&larr; Home</a>
      <h1 id="title">Activity I</h1>
    </header>

    <p class="muted activity-subtitle">Tap any flashcard to hear the word.</p>

    <section id="cards" class="grid"></section>

    <footer class="footer">
      <a id="toA4" class="btn" href="./activity4.html">Go to Activity IV &rarr;</a>
    </footer>
  </main>

  <script type="module">
    // Route to the correct activity module based on the book parameter.
    const book = parseInt(new URLSearchParams(location.search).get('book') || '1', 10);
    if (book === 2) {
      import('./js/book2-match.js');
    } else {
      import('./js/demo.js');
    }
  </script>
</body>
</html>
